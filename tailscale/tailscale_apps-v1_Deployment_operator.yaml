apiVersion: apps/v1
kind: Deployment
metadata:
  name: operator
  namespace: tailscale
spec:
  replicas: 1
  selector:
    matchLabels:
      app: operator
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: operator
    spec:
      containers:
      - env:
        - name: APISERVER_PROXY
          value: 'false'
        - name: CLIENT_ID_FILE
          value: /oauth/client_id
        - name: CLIENT_SECRET_FILE
          value: /oauth/client_secret
        - name: OPERATOR_HOSTNAME
          value: hfym-ds-operator
        - name: OPERATOR_INGRESS_CLASS_NAME
          value: tailscale
        - name: OPERATOR_INITIAL_TAGS
          value: tag:hfym-ds-operator
        - name: OPERATOR_LOGGING
          value: info
        - name: OPERATOR_LOGIN_SERVER
        - name: OPERATOR_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        - name: OPERATOR_SECRET
          value: operator
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: POD_UID
          valueFrom:
            fieldRef:
              fieldPath: metadata.uid
        - name: PROXY_FIREWALL_MODE
          value: auto
        - name: PROXY_IMAGE
          value: tailscale/tailscale:v1.96.5
        - name: PROXY_TAGS
          value: tag:hfym-ds
        image: tailscale/k8s-operator:v1.96.5
        imagePullPolicy: Always
        name: operator
        volumeMounts:
        - mountPath: /oauth
          name: oauth
          readOnly: true
      nodeSelector:
        kubernetes.io/os: linux
      serviceAccountName: operator
      volumes:
      - name: oauth
        secret:
          secretName: operator-oauth
