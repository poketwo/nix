apiVersion: v1
data:
  datasources.yaml: |
    apiVersion: 1
    datasources:
    - name: Mimir
      type: prometheus
      url: http://mimir-gateway.mimir.svc.cluster.local/prometheus
    - name: Loki
      type: loki
      url: http://loki-gateway.loki.svc.cluster.local
  grafana.ini: |
    [analytics]
    check_for_updates = true
    [auth.generic_oauth]
    allow_sign_up = true
    api_url = https://auth-dev.poketwo.io/realms/poketwo/protocol/openid-connect/userinfo
    auth_url = https://auth-dev.poketwo.io/realms/poketwo/protocol/openid-connect/auth
    auto_login = true
    client_id = grafana.hfym.co
    enabled = true
    name = Pokétwo
    role_attribute_path = to_string('Editor')
    scopes = openid email profile
    token_url = https://auth-dev.poketwo.io/realms/poketwo/protocol/openid-connect/token
    [explore]
    enabled = true
    [log]
    mode = console
    [paths]
    data = /var/lib/grafana/
    logs = /var/log/grafana
    plugins = /var/lib/grafana/plugins
    provisioning = /etc/grafana/provisioning
    [server]
    domain = grafana.hfym.co
    root_url = https://grafana.hfym.co
    [unified_storage]
    index_path = /var/lib/grafana-search/bleve
kind: ConfigMap
metadata:
  labels:
    app.kubernetes.io/instance: grafana
    app.kubernetes.io/name: grafana
    app.kubernetes.io/version: 13.0.1
    helm.sh/chart: grafana-12.0.0
  name: grafana
  namespace: grafana
