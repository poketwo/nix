name: Build NixOS Hosts

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check-flake:
    runs-on: ubuntu-latest
    steps:
      - name: Clone repository
        uses: actions/checkout@v4
      - name: Install Nix
        uses: DeterminateSystems/determinate-nix-action@v3
      - name: Check Nix flake inputs
        uses: DeterminateSystems/flake-checker-action@v10

  hosts:
    runs-on: ubuntu-latest
    outputs:
      hosts: ${{ steps.list.outputs.hosts }}
    steps:
      - name: Clone repository
        uses: actions/checkout@v4
      - name: Install Nix
        uses: DeterminateSystems/determinate-nix-action@v3
      - name: List hosts
        id: list
        run: |
          hosts=$(nix eval --json .#colmena --apply 'x: builtins.filter (n: n != "meta") (builtins.attrNames x)')
          echo "hosts=$hosts" >> "$GITHUB_OUTPUT"

  build:
    runs-on: ubuntu-latest
    needs: [check-flake, hosts]
    strategy:
      fail-fast: false
      matrix:
        host: ${{ fromJson(needs.hosts.outputs.hosts) }}
    steps:
      - name: Clone repository
        uses: actions/checkout@v4
      - name: Install Nix
        uses: DeterminateSystems/determinate-nix-action@v3
      - name: Setup Magic Nix Cache
        uses: DeterminateSystems/magic-nix-cache-action@v8
      - name: Build ${{ matrix.host }}
        run: nix develop -c colmena build --on ${{ matrix.host }}
