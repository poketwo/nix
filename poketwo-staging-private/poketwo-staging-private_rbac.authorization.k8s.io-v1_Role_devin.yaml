apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: devin
  namespace: poketwo-staging-private
rules:
- apiGroups:
  - apps
  resources:
  - statefulsets
  - deployments
  verbs:
  - get
  - list
  - patch
- apiGroups:
  - ''
  resources:
  - pods
  verbs:
  - get
  - list
  - delete
- apiGroups:
  - ''
  resources:
  - pods/log
  verbs:
  - get
- apiGroups:
  - ''
  resources:
  - services
  - configmaps
  - events
  verbs:
  - get
  - list
