apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app.kubernetes.io/instance: retool
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: retool-workflow-worker
    helm.sh/chart: retool-6.10.0
    retoolService: retool-workflow-worker
    telemetry.retool.com/service-name: workflow-worker
  name: retool-workflow-worker
  namespace: retool
spec:
  replicas: 1
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      retoolService: retool-workflow-worker
  template:
    metadata:
      annotations:
        prometheus.io/job: retool-workflow-worker
        prometheus.io/port: '9090'
        prometheus.io/scrape: 'true'
      labels:
        app.kubernetes.io/instance: retool
        app.kubernetes.io/managed-by: Helm
        app.kubernetes.io/name: retool-workflow-worker
        helm.sh/chart: retool-6.10.0
        retoolService: retool-workflow-worker
        telemetry.retool.com/service-name: workflow-worker
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app.kubernetes.io/name
                  operator: In
                  values:
                  - retool
              topologyKey: kubernetes.io/hostname
            weight: 100
      containers:
      - args:
        - bash
        - -c
        - chmod -R +x ./docker_scripts; sync; ./docker_scripts/wait-for-it.sh -t 0
          "postgres-rw":"5432"; ./docker_scripts/start_api.sh
        env:
        - name: DEPLOYMENT_TEMPLATE_TYPE
          value: k8s-helm
        - name: DEPLOYMENT_TEMPLATE_VERSION
          value: 6.10.0
        - name: NODE_ENV
          value: production
        - name: NODE_OPTIONS
          value: --max_old_space_size=1024
        - name: SERVICE_TYPE
          value: WORKFLOW_TEMPORAL_WORKER
        - name: DBCONNECTOR_POSTGRES_POOL_MAX_SIZE
          value: '100'
        - name: DBCONNECTOR_QUERY_TIMEOUT_MS
          value: '5400000'
        - name: DISABLE_DATABASE_MIGRATIONS
          value: 'true'
        - name: WORKFLOW_WORKER_HEALTHCHECK_PORT
          value: '3005'
        - name: WORKFLOW_BACKEND_HOST
          value: http://retool-workflow-backend
        - name: CLIENT_ID
          value: 997504863600-6nfvs9g5cbtovgnfjpq50h6r3p7jnr2l.apps.googleusercontent.com
        - name: COOKIE_INSECURE
          value: 'false'
        - name: POSTGRES_HOST
          value: postgres-rw
        - name: POSTGRES_PORT
          value: '5432'
        - name: POSTGRES_DB
          value: retool
        - name: POSTGRES_USER
          value: retool
        - name: POSTGRES_SSL_ENABLED
          value: 'true'
        - name: CODE_EXECUTOR_INGRESS_DOMAIN
          value: http://retool-code-executor
        - name: LICENSE_KEY
          valueFrom:
            secretKeyRef:
              key: license-key
              name: retool
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              key: jwt-secret
              name: retool
        - name: ENCRYPTION_KEY
          valueFrom:
            secretKeyRef:
              key: encryption-key
              name: retool
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              key: password
              name: postgres-app
        - name: CLIENT_SECRET
          valueFrom:
            secretKeyRef:
              key: google-client-secret
              name: retool
        - name: BASE_DOMAIN
          value: https://retool.poketwo.io
        - name: DEFAULT_GROUP_FOR_DOMAINS
          value: poketwo.net -> all-users
        image: tryretool/backend:3.334.4-stable
        imagePullPolicy: IfNotPresent
        livenessProbe:
          failureThreshold: 3
          httpGet:
            path: /api/checkHealth
            port: 3005
          initialDelaySeconds: 30
          timeoutSeconds: 10
        name: workflow-worker
        ports:
        - containerPort: 3005
          name: http-server
          protocol: TCP
        - containerPort: 9090
          name: http-metrics
          protocol: TCP
        readinessProbe:
          httpGet:
            path: /api/checkHealth
            port: 3005
          initialDelaySeconds: 30
          periodSeconds: 10
          successThreshold: 5
          timeoutSeconds: 10
        resources:
          limits:
            cpu: 2000m
            memory: 8192Mi
          requests:
            cpu: 1000m
            memory: 2048Mi
      nodeSelector:
        kubernetes.io/arch: amd64
      serviceAccountName: retool
      tolerations: []
