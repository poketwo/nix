apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app.kubernetes.io/instance: retool
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: retool
    helm.sh/chart: retool-6.10.0
  name: retool
  namespace: retool
spec:
  replicas: 2
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app.kubernetes.io/instance: retool
      app.kubernetes.io/name: retool
  template:
    metadata:
      labels:
        app.kubernetes.io/instance: retool
        app.kubernetes.io/managed-by: Helm
        app.kubernetes.io/name: retool
        helm.sh/chart: retool-6.10.0
        telemetry.retool.com/service-name: main-backend
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app.kubernetes.io/name
                  operator: In
                  values:
                  - retool
              topologyKey: kubernetes.io/hostname
            weight: 100
      containers:
      - args:
        - bash
        - -c
        - chmod -R +x ./docker_scripts; sync; ./docker_scripts/wait-for-it.sh -t 0
          "postgres-rw":"5432"; ./docker_scripts/start_api.sh
        env:
        - name: DEPLOYMENT_TEMPLATE_TYPE
          value: k8s-helm
        - name: DEPLOYMENT_TEMPLATE_VERSION
          value: 6.10.0
        - name: NODE_ENV
          value: production
        - name: SERVICE_TYPE
          value: MAIN_BACKEND,DB_CONNECTOR,DB_SSH_CONNECTOR
        - name: CLIENT_ID
          value: 997504863600-6nfvs9g5cbtovgnfjpq50h6r3p7jnr2l.apps.googleusercontent.com
        - name: COOKIE_INSECURE
          value: 'false'
        - name: POSTGRES_HOST
          value: postgres-rw
        - name: POSTGRES_PORT
          value: '5432'
        - name: POSTGRES_DB
          value: retool
        - name: POSTGRES_USER
          value: retool
        - name: POSTGRES_SSL_ENABLED
          value: 'true'
        - name: DBCONNECTOR_POSTGRES_POOL_MAX_SIZE
          value: '10'
        - name: WORKFLOW_BACKEND_HOST
          value: http://retool-workflow-backend
        - name: CODE_EXECUTOR_INGRESS_DOMAIN
          value: http://retool-code-executor
        - name: LICENSE_KEY
          valueFrom:
            secretKeyRef:
              key: license-key
              name: retool
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              key: jwt-secret
              name: retool
        - name: ENCRYPTION_KEY
          valueFrom:
            secretKeyRef:
              key: encryption-key
              name: retool
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              key: password
              name: postgres-app
        - name: CLIENT_SECRET
          valueFrom:
            secretKeyRef:
              key: google-client-secret
              name: retool
        - name: BASE_DOMAIN
          value: https://retool.poketwo.io
        - name: DEFAULT_GROUP_FOR_DOMAINS
          value: poketwo.net -> all-users
        image: tryretool/backend:3.334.4-stable
        imagePullPolicy: IfNotPresent
        lifecycle:
          preStop:
            exec:
              command:
              - sleep
              - '30'
        livenessProbe:
          failureThreshold: 3
          httpGet:
            path: /api/checkHealth
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 10
        name: main-backend
        ports:
        - containerPort: 3000
          name: http-server
          protocol: TCP
        readinessProbe:
          httpGet:
            path: /api/checkHealth
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 10
          successThreshold: 5
          timeoutSeconds: 10
        resources:
          limits:
            cpu: 4096m
            memory: 8192Mi
          requests:
            cpu: 2048m
            memory: 4096Mi
      nodeSelector:
        kubernetes.io/arch: amd64
      serviceAccountName: retool
      tolerations: []
